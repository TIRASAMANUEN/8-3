<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gửi Cốt ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Pattaya&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; font-family: 'Pattaya', sans-serif; }
    #scene { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at bottom, #1b2735, #090a0f); }
    .heart-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 5; }
    #heartBtn { background: transparent; border: none; cursor: pointer; transition: transform 0.2s; padding: 0; }
    #heartBtn svg { width: 140px; filter: drop-shadow(0 0 20px #ff2b4f); }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="scene">
    <div id="starsContainer"></div>
    <div class="heart-container">
      <button id="heartBtn">
        <svg viewBox="0 0 200 180"><path d="M100,162.2C17.7,99.5,6,77.5,6,52.3C6,27.1,27.1,6,52.3,6c15.4,0,30.8,7.7,40,20.6l7.7,9.6l7.7-9.6 c9.2-12.9,24.6-20.6,40-20.6c25.2,0,46.3,21.1,46.3,46.3c0,25.2-11.7,47.2-94,109.9L100,162.2L100,162.2z" fill="#ff2b4f" /></svg>
      </button>
    </div>
  </div>
  <audio id="audioPlayer" loop><source src="nhac.mp3" type="audio/mpeg"></audio>
  <script src="script.js"></script>
</body>
</html>
